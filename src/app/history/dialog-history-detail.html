<div class="border-b border-gray-200 px-4 pb-3 pt-2 dark:border-gray-700">
  <h2 class="m-0 text-lg font-semibold text-gray-900 dark:text-white">Registros del día (mismo documento)</h2>
</div>

<mat-dialog-content class="!max-h-[70vh] !overflow-y-auto">
  <div *ngIf="loading" class="flex justify-center py-10">
    <svg
      class="h-9 w-9 animate-spin text-teal-600 dark:text-teal-400"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </div>

  <div *ngIf="!loading" class="overflow-x-auto rounded-lg border border-gray-200 dark:border-gray-700">
    <table class="w-full text-left text-sm text-gray-500 dark:text-gray-400">
      <thead class="bg-gray-50 text-xs uppercase text-gray-700 dark:bg-gray-700 dark:text-gray-400">
        <tr>
          <th scope="col" class="px-4 py-3">DNI</th>
          <th scope="col" class="px-4 py-3">Nombre</th>
          <th scope="col" class="px-4 py-3">Hora</th>
          <th scope="col" class="px-4 py-3">Estado</th>
          <th scope="col" class="px-4 py-3"></th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let a of detailRows"
          class="border-b bg-white hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:hover:bg-gray-600">
          <td class="px-4 py-3 font-medium text-gray-900 dark:text-white">{{ a.doc_number }}</td>
          <td class="px-4 py-3">{{ a.name }}</td>
          <td class="px-4 py-3 whitespace-nowrap">{{ a.hour_entrance }}</td>
          <td class="px-4 py-3">{{ a.obs }}</td>
          <td class="px-4 py-3">
            <mat-icon *ngIf="a.obs == 'PERMITIDO' || a.obs == 'permitido'" class="text-green-700 dark:text-green-400">
              check
            </mat-icon>
            <mat-icon *ngIf="a.obs == 'DENEGADO' || a.obs == 'denegado'" class="text-red-700 dark:text-red-400">
              block
            </mat-icon>
            <mat-icon *ngIf="a.obs == 'RESTRINGIDO' || a.obs == 'OBSERVADO'" class="text-amber-600 dark:text-amber-400">
              warning
            </mat-icon>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="!border-t !border-gray-200 !px-4 !pb-4 !pt-3 dark:!border-gray-700">
  <button
    type="button"
    (click)="onNoClick()"
    class="rounded-lg bg-gradient-to-r from-teal-400 via-teal-500 to-teal-600 px-5 py-2.5 text-sm font-medium text-white shadow-lg shadow-teal-500/50 hover:bg-gradient-to-br focus:outline-none focus:ring-4 focus:ring-teal-300 dark:shadow-teal-800/80 dark:focus:ring-teal-800">
    Cerrar
  </button>
</mat-dialog-actions>
